<div class="register-container">
  <div class="register-card">
    <h2 class="text-center text-primary">Crear Cuenta</h2>

    <!-- Formulario de registro -->
    <form>
      <div class="mb-3">
        <label for="name" class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" id="name" placeholder="Ingresa tu nombre" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="Ingresa una contraseña segura" required>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu contraseña" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Registrarse</button>
      </div>

      <div class="text-center mt-3">
        <p class="text-muted">¿Ya tienes una cuenta? <a href="/login">Iniciar sesión</a></p>
      </div>
    </form>
  </div>
</div>
